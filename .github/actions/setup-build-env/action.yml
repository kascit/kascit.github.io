---
name: Setup Build Environment
description: Common setup steps for CI, deploy, and lint workflows.

inputs:
  install-imagemagick:
    description: "Whether to install ImageMagick (build workflows need it, lint does not)"
    required: false
    default: "false"

runs:
  using: composite
  steps:
    - name: Load tool versions
      id: versions
      shell: bash
      run: |
        grep -vE '^(#|$)' versions.env >> "$GITHUB_ENV"
        grep -vE '^(#|$)' versions.env | while IFS='=' read -r key value; do
          echo "${key}=${value}" >> "$GITHUB_OUTPUT"
        done

    - name: Setup Node.js
      uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
      with:
        node-version: "20"

    - name: Enable Corepack
      shell: bash
      run: corepack enable

    - name: Activate pnpm
      shell: bash
      run: corepack prepare pnpm@${{ steps.versions.outputs.PNPM_VERSION }} --activate

    - name: Cache npm downloads
      uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
      with:
        path: ~/.npm
        key: npm-tools-${{ runner.os }}-${{ steps.versions.outputs.TERSER_VERSION }}-${{ steps.versions.outputs.ESBUILD_VERSION }}
        restore-keys: |
          npm-tools-${{ runner.os }}-

    - name: Cache pnpm store
      uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
      with:
        path: ~/.pnpm-store
        key: pnpm-tools-${{ runner.os }}-${{ steps.versions.outputs.PNPM_VERSION }}-${{ steps.versions.outputs.ESLINT_VERSION }}-${{ steps.versions.outputs.STYLELINT_VERSION }}
        restore-keys: |
          pnpm-tools-${{ runner.os }}-

    - name: Install xmllint
      shell: bash
      run: |
        sudo apt-get update
        sudo apt-get install --no-install-recommends -y libxml2-utils

    - name: Install ImageMagick
      if: inputs.install-imagemagick == 'true'
      shell: bash
      run: sudo apt-get install --no-install-recommends -y imagemagick

    - name: Install just
      uses: taiki-e/install-action@1ed3272338f573e042a2e6bca3893aa19f43b47a # v2
      with:
        tool: just

    - name: Cache Zola binary
      uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
      with:
        path: ~/.cargo/bin/zola
        key: zola-${{ steps.versions.outputs.ZOLA_VERSION }}

    - name: Install Zola
      uses: taiki-e/install-action@1ed3272338f573e042a2e6bca3893aa19f43b47a # v2
      with:
        tool: zola@${{ steps.versions.outputs.ZOLA_VERSION }}

    - name: Verify Zola installation
      shell: bash
      run: zola --version

    - name: Cache CSS build dependencies
      uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
      with:
        path: |
          tools/tailwindcss
          src/vendor/daisyui.js
          src/vendor/daisyui-theme.js
        key: css-build-${{ steps.versions.outputs.TAILWIND_VERSION }}-${{ steps.versions.outputs.DAISYUI_VERSION }}
