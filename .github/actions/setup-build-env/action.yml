---
name: Setup Build Environment
description: Common setup steps for CI, deploy, and lint workflows.

inputs:
  install-imagemagick:
    description: "Whether to install ImageMagick (build workflows need it, lint does not)"
    required: false
    default: "false"

runs:
  using: composite
  steps:
    - name: Load tool versions
      id: versions
      shell: bash
      run: |
        grep -vE '^(#|$)' versions.env >> "$GITHUB_ENV"
        grep -vE '^(#|$)' versions.env | while IFS='=' read -r key value; do
          echo "${key}=${value}" >> "$GITHUB_OUTPUT"
        done

    - name: Setup Node.js
      uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
      with:
        node-version: "20"

    - name: Enable Corepack
      shell: bash
      run: corepack enable

    - name: Activate pnpm
      shell: bash
      run: corepack prepare pnpm@${{ steps.versions.outputs.PNPM_VERSION }} --activate

    - name: Cache npm downloads
      uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
      with:
        path: ~/.npm
        key: npm-tools-${{ runner.os }}-${{ steps.versions.outputs.TERSER_VERSION }}-${{ steps.versions.outputs.ESBUILD_VERSION }}
        restore-keys: |
          npm-tools-${{ runner.os }}-

    - name: Cache pnpm store
      uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
      with:
        path: ~/.local/share/pnpm/store
        key: pnpm-tools-${{ runner.os }}-${{ steps.versions.outputs.PNPM_VERSION }}-${{ steps.versions.outputs.ESLINT_VERSION }}-${{ steps.versions.outputs.STYLELINT_VERSION }}
        restore-keys: |
          pnpm-tools-${{ runner.os }}-

    - name: Install system packages
      shell: bash
      run: |
        # Skip packages that are already installed (warm runner pool reuse)
        pkgs=()
        command -v xmllint &>/dev/null || pkgs+=(libxml2-utils)
        if [[ "${{ inputs.install-imagemagick }}" == "true" ]]; then
          command -v convert &>/dev/null || pkgs+=(imagemagick librsvg2-bin)
        fi
        if [[ ${#pkgs[@]} -gt 0 ]]; then
          sudo apt-get update -qq
          sudo apt-get install --no-install-recommends -y "${pkgs[@]}"
        fi

    - name: Cache just binary
      id: cache-just
      uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
      with:
        path: ~/.cargo/bin/just
        key: just-${{ runner.os }}-${{ steps.versions.outputs.JUST_VERSION }}

    - name: Install just
      if: steps.cache-just.outputs.cache-hit != 'true'
      uses: taiki-e/install-action@1ed3272338f573e042a2e6bca3893aa19f43b47a # v2
      with:
        tool: just@${{ steps.versions.outputs.JUST_VERSION }}

    - name: Cache Zola binary
      id: cache-zola
      uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
      with:
        path: ~/.install-action/bin/zola
        key: zola-${{ steps.versions.outputs.ZOLA_VERSION }}

    - name: Install Zola
      if: steps.cache-zola.outputs.cache-hit != 'true'
      uses: taiki-e/install-action@1ed3272338f573e042a2e6bca3893aa19f43b47a # v2
      with:
        tool: zola@${{ steps.versions.outputs.ZOLA_VERSION }}

    - name: Add zola to PATH
      shell: bash
      run: echo "$HOME/.install-action/bin" >> "$GITHUB_PATH"

    - name: Cache CSS build dependencies
      uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
      with:
        path: |
          tools/tailwindcss
          src/vendor/daisyui.js
          src/vendor/daisyui-theme.js
        key: css-build-${{ steps.versions.outputs.TAILWIND_VERSION }}-${{ steps.versions.outputs.DAISYUI_VERSION }}
