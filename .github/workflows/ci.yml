name: CI - Build & Test

on:
  pull_request:
    branches: [main]
  push:
    branches-ignore: [main]

permissions:
  contents: read

defaults:
  run:
    shell: bash

jobs:
  build:
    name: Build & Validate
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0

      - name: Load tool versions
        run: |
          grep -vE '^(#|$)' versions.env >> "$GITHUB_ENV"

      - name: Cache Zola binary
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/zola
          key: zola-${{ env.ZOLA_VERSION || '0.19.2' }}

      - name: Install Zola
        uses: taiki-e/install-action@v2
        with:
          tool: zola@${{ env.ZOLA_VERSION || '0.19.2' }}

      - name: Verify Zola installation
        run: zola --version

      - name: Cache CSS build dependencies
        uses: actions/cache@v4
        with:
          path: |
            src/tailwindcss
            src/daisyui.js
            src/daisyui-theme.js
          key: css-build-${{ env.TAILWIND_VERSION }}-${{ env.DAISYUI_VERSION }}

      - name: Build CSS (Tailwind + DaisyUI)
        run: |
          set -euo pipefail
          
          if [[ ! -f ./tailwindcss ]]; then
            echo "Downloading Tailwind CSS v${TAILWIND_VERSION}"
            curl -fsSL -o ./tailwindcss "https://github.com/tailwindlabs/tailwindcss/releases/download/v${TAILWIND_VERSION}/tailwindcss-linux-x64"
            chmod +x ./tailwindcss
          fi
          
          if [[ ! -f src/daisyui.js ]]; then
            echo "Downloading DaisyUI v${DAISYUI_VERSION}"
            curl -fsSL -o src/daisyui.js "https://github.com/saadeghi/daisyui/releases/download/v${DAISYUI_VERSION}/daisyui.js"
            curl -fsSL -o src/daisyui-theme.js "https://github.com/saadeghi/daisyui/releases/download/v${DAISYUI_VERSION}/daisyui-theme.js"
          fi
          
          echo "Building CSS"
          ./tailwindcss -i src/main.css -o static/css/main.css --minify

      - name: Build site with Zola
        run: |
          echo "Building site..."
          zola build

      - name: Validate build output
        run: |
          set -euo pipefail
          
          # Check critical files exist
          [[ -f public/index.html ]] || { echo "ERROR: index.html missing"; exit 1; }
          [[ -f public/404.html ]] || echo "WARN: 404.html missing"
          [[ -d public/css ]] || { echo "ERROR: css directory missing"; exit 1; }
          
          # Check file count
          file_count=$(find public -type f | wc -l)
          echo "Generated $file_count files"
          [[ $file_count -gt 0 ]] || { echo "ERROR: No files generated"; exit 1; }
          
          # Check for broken links (basic)
          if grep -r "href=\"\"" public/ 2>/dev/null; then
            echo "WARN: Empty hrefs found"
          fi
          
          echo "Build validation passed"

      - name: Check Zola syntax
        run: |
          echo "Checking Zola templates..."
          zola check || true

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: site-build-${{ github.run_id }}
          path: ./public
          retention-days: 1
          if-no-files-found: error