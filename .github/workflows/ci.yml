name: CI - Build & Test

on:
  pull_request:
    branches: [main]
  push:
    branches-ignore: [main]

permissions:
  contents: read

defaults:
  run:
    shell: bash

jobs:
  build:
    name: Build & Validate
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Load tool versions
        run: |
          grep -vE '^(#|$)' versions.env >> "$GITHUB_ENV"

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "20"

      - name: Install just
        uses: taiki-e/install-action@d858f8113943481093e02986a7586a4819a3bfd6 # v2
        with:
          tool: just

      - name: Cache Zola binary
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.cargo/bin/zola
          key: zola-${{ env.ZOLA_VERSION || '0.19.2' }}

      - name: Install Zola
        uses: taiki-e/install-action@d858f8113943481093e02986a7586a4819a3bfd6 # v2
        with:
          tool: zola@${{ env.ZOLA_VERSION || '0.19.2' }}

      - name: Verify Zola installation
        run: zola --version

      - name: Cache CSS build dependencies
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            tools/tailwindcss
            src/vendor/daisyui.js
            src/vendor/daisyui-theme.js
          key: css-build-${{ env.TAILWIND_VERSION }}-${{ env.DAISYUI_VERSION }}

      - name: Build site via justfile
        run: just ci-build

      - name: Check Zola syntax
        run: |
          echo "Checking Zola templates..."
          zola check

      - name: Upload build artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: site-build-${{ github.run_id }}
          path: ./public
          retention-days: 1
          if-no-files-found: error