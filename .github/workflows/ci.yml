name: CI - Build & Test

on:
  pull_request:
    branches: [main]
    paths-ignore:
      - "README.md"
      - "LICENSE"
      - "docs/**"
  push:
    branches-ignore: [main]
    paths-ignore:
      - "README.md"
      - "LICENSE"
      - "docs/**"
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

defaults:
  run:
    shell: bash

jobs:
  build:
    name: Build & Validate
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Load tool versions
        run: |
          grep -vE '^(#|$)' versions.env >> "$GITHUB_ENV"

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: "20"

      - name: Install just
        uses: taiki-e/install-action@1ed3272338f573e042a2e6bca3893aa19f43b47a # v2
        with:
          tool: just

      - name: Cache Zola binary
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: ~/.cargo/bin/zola
          key: zola-${{ env.ZOLA_VERSION || '0.19.2' }}

      - name: Install Zola
        uses: taiki-e/install-action@1ed3272338f573e042a2e6bca3893aa19f43b47a # v2
        with:
          tool: zola@${{ env.ZOLA_VERSION || '0.19.2' }}

      - name: Verify Zola installation
        run: zola --version

      - name: Cache CSS build dependencies
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: |
            tools/tailwindcss
            src/vendor/daisyui.js
            src/vendor/daisyui-theme.js
          key: css-build-${{ env.TAILWIND_VERSION }}-${{ env.DAISYUI_VERSION }}

      - name: Build site via justfile
        run: just ci-build

      - name: Check Zola syntax
        run: |
          echo "Checking Zola templates..."
          zola check

      - name: Upload build artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: site-build-${{ github.run_id }}
          path: ./public
          retention-days: 1
          if-no-files-found: error