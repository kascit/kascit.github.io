name: CI - Build & Test

on:
  pull_request:
    branches: [main]
    paths-ignore:
      - "README.md"
      - "LICENSE"
      - "docs/**"
  push:
    branches-ignore: [main, dependabot/**]
    paths-ignore:
      - "README.md"
      - "LICENSE"
      - "docs/**"
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  attestations: write
  contents: read
  id-token: write

defaults:
  run:
    shell: bash

jobs:
  build:
    name: Build & Validate
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Load tool versions
        id: versions
        run: |
          grep -vE '^(#|$)' versions.env >> "$GITHUB_ENV"
          grep -vE '^(#|$)' versions.env | while IFS='=' read -r key value; do
            echo "${key}=${value}" >> "$GITHUB_OUTPUT"
          done

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: "20"

      - name: Cache npm downloads
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: ~/.npm
          key: npm-tools-${{ runner.os }}-${{ steps.versions.outputs.TERSER_VERSION }}-${{ steps.versions.outputs.ESBUILD_VERSION }}
          restore-keys: |
            npm-tools-${{ runner.os }}-

      - name: Install just
        uses: taiki-e/install-action@1ed3272338f573e042a2e6bca3893aa19f43b47a # v2
        with:
          tool: just

      - name: Cache Zola binary
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: ~/.cargo/bin/zola
          key: zola-${{ steps.versions.outputs.ZOLA_VERSION }}

      - name: Install Zola
        uses: taiki-e/install-action@1ed3272338f573e042a2e6bca3893aa19f43b47a # v2
        with:
          tool: zola@${{ steps.versions.outputs.ZOLA_VERSION }}

      - name: Verify Zola installation
        run: zola --version

      - name: Cache CSS build dependencies
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: |
            tools/tailwindcss
            src/vendor/daisyui.js
            src/vendor/daisyui-theme.js
          key: css-build-${{ steps.versions.outputs.TAILWIND_VERSION }}-${{ steps.versions.outputs.DAISYUI_VERSION }}

      - name: Build site via justfile
        run: just ci-build

      - name: Build summary
        run: |
          set -euo pipefail
          file_count=$(find public -type f | wc -l | tr -d ' ')
          hashed_count=$(find public -type f | grep -E '\\.[a-f0-9]{12}\\.' | wc -l | tr -d ' ' || true)
          echo "### CI Build Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "- Files in public/: ${file_count}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Fingerprinted assets: ${hashed_count}" >> "$GITHUB_STEP_SUMMARY"
          if [ -f public/asset-manifest.json ]; then
            echo "- Asset manifest: present" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "- Asset manifest: missing" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Check Zola syntax
        run: |
          echo "Checking Zola templates..."
          zola check

      - name: Upload build artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: site-build-${{ github.run_id }}
          path: ./public
          retention-days: 1
          if-no-files-found: error

      - name: Create build archive for provenance
        run: tar -czf site-build-${{ github.run_id }}.tar.gz public

      - name: Generate artifact attestation
        uses: actions/attest-build-provenance@977bb373ede98d70efdf65b84cb5f73e068dcc2a # v3
        with:
          subject-path: site-build-${{ github.run_id }}.tar.gz