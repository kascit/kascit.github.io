---
name: Deploy Zola Site to GitHub Pages

# Intentionally no pull_request trigger: deployment checks do not gate PRs.
# CI/Lint workflows handle PR validation, including Dependabot PRs.

on:
  push:
    branches: [main]
    paths-ignore:
      - "README.md"
      - "LICENSE"
      - "docs/**"
      - ".prettierignore"
  workflow_dispatch:
    inputs:
      deploy:
        description: 'Deploy after build'
        required: false
        default: true
        type: boolean

permissions:
  attestations: write
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

defaults:
  run:
    shell: bash

jobs:
  build:
    name: Build Zola Site
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Load tool versions
        id: versions
        run: |
          grep -vE '^(#|$)' versions.env >> "$GITHUB_ENV"
          grep -vE '^(#|$)' versions.env | while IFS='=' read -r key value; do
            echo "${key}=${value}" >> "$GITHUB_OUTPUT"
          done

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: "20"

      - name: Enable Corepack
        run: corepack enable

      - name: Activate pnpm
        run: corepack prepare pnpm@${{ steps.versions.outputs.PNPM_VERSION }} --activate

      - name: Cache npm downloads
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: ~/.npm
          key: npm-tools-${{ runner.os }}-${{ steps.versions.outputs.TERSER_VERSION }}-${{ steps.versions.outputs.ESBUILD_VERSION }}
          restore-keys: |
            npm-tools-${{ runner.os }}-

      - name: Cache pnpm store
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: ~/.pnpm-store
          key: pnpm-tools-${{ runner.os }}-${{ steps.versions.outputs.PNPM_VERSION }}-${{ steps.versions.outputs.ESLINT_VERSION }}-${{ steps.versions.outputs.STYLELINT_VERSION }}
          restore-keys: |
            pnpm-tools-${{ runner.os }}-

      - name: Install xmllint
        run: |
          sudo apt-get update
          sudo apt-get install --no-install-recommends -y libxml2-utils

      - name: Install just
        uses: taiki-e/install-action@1ed3272338f573e042a2e6bca3893aa19f43b47a # v2
        with:
          tool: just

      - name: Setup GitHub Pages
        id: pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0

      - name: Cache Zola binary
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: ~/.cargo/bin/zola
          key: zola-${{ steps.versions.outputs.ZOLA_VERSION }}

      - name: Install Zola
        uses: taiki-e/install-action@1ed3272338f573e042a2e6bca3893aa19f43b47a # v2
        with:
          tool: zola@${{ steps.versions.outputs.ZOLA_VERSION }}

      - name: Verify Zola installation
        run: zola --version

      - name: Cache CSS build dependencies
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: |
            tools/tailwindcss
            src/vendor/daisyui.js
            src/vendor/daisyui-theme.js
          key: css-build-${{ steps.versions.outputs.TAILWIND_VERSION }}-${{ steps.versions.outputs.DAISYUI_VERSION }}

      - name: Build site via justfile
        env:
          ZOLA_BASE_URL: ${{ steps.pages.outputs.base_url }}
        run: just ci-build

      - name: Build summary
        run: |
          set -euo pipefail
          file_count=$(find public -type f | wc -l | tr -d ' ')
          hashed_count=$(find public -type f -print | grep -Ec '\\.[a-f0-9]{12}\\.' || true)
          {
            echo "### Deploy Build Summary"
            echo "- Files in public/: ${file_count}"
            echo "- Fingerprinted assets: ${hashed_count}"
            echo "- Pages base URL: ${{ steps.pages.outputs.base_url }}"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Create deploy archive for provenance
        run: tar -czf site-deploy-${{ github.run_id }}.tar.gz public

      - name: Generate deploy attestation
        uses: actions/attest-build-provenance@977bb373ede98d70efdf65b84cb5f73e068dcc2a # v3
        with:
          subject-path: site-deploy-${{ github.run_id }}.tar.gz

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@7b1f4a764d45c48632c6b24a0339c27f5614fb0b # v4.0.0
        with:
          path: ./public
          retention-days: 7

  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && github.event.inputs.deploy == 'true')
    timeout-minutes: 5

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0