name: Deploy Zola Site to GitHub Pages

on:
  push:
    branches: [main]
    paths-ignore:
      - "README.md"
      - "LICENSE"
      - "docs/**"
      - ".prettierignore"
  workflow_dispatch:
    inputs:
      deploy:
        description: 'Deploy after build'
        required: false
        default: true
        type: boolean

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

defaults:
  run:
    shell: bash

jobs:
  build:
    name: Build Zola Site
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Load tool versions
        run: |
          grep -vE '^(#|$)' versions.env >> "$GITHUB_ENV"

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "20"

      - name: Install just
        uses: taiki-e/install-action@d858f8113943481093e02986a7586a4819a3bfd6 # v2
        with:
          tool: just

      - name: Setup GitHub Pages
        id: pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0

      - name: Cache Zola binary
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: ~/.cargo/bin/zola
          key: zola-${{ env.ZOLA_VERSION || '0.19.2' }}

      - name: Install Zola
        uses: taiki-e/install-action@d858f8113943481093e02986a7586a4819a3bfd6 # v2
        with:
          tool: zola@${{ env.ZOLA_VERSION || '0.19.2' }}

      - name: Verify Zola installation
        run: zola --version

      - name: Cache CSS build dependencies
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: |
            tools/tailwindcss
            src/vendor/daisyui.js
            src/vendor/daisyui-theme.js
          key: css-build-${{ env.TAILWIND_VERSION }}-${{ env.DAISYUI_VERSION }}

      - name: Build site via justfile
        env:
          ZOLA_BASE_URL: ${{ steps.pages.outputs.base_url }}
        run: just ci-build

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@7b1f4a764d45c48632c6b24a0339c27f5614fb0b # v4.0.0
        with:
          path: ./public
          retention-days: 7

  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && github.event.inputs.deploy == 'true')
    timeout-minutes: 5

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0