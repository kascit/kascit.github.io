name: Deploy Zola Site to GitHub Pages

on:
  push:
    branches: [main]
    paths-ignore:
      - "README.md"
      - "LICENSE"
      - "docs/**"
      - ".prettierignore"
  workflow_dispatch:
    inputs:
      # checkov:skip=CKV_GHA_7: Manual dispatch inputs are maintainer-controlled; deploy is boolean and zola_version is optional override only.
      zola_version:
        description: 'Zola version to use (keep in sync with versions.env)'
        required: false
        default: '0.19.2'
      deploy:
        description: 'Deploy after build'
        required: false
        default: true
        type: boolean

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

defaults:
  run:
    shell: bash

jobs:
  build:
    name: Build Zola Site
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Load tool versions
        run: |
          grep -vE '^(#|$)' versions.env >> "$GITHUB_ENV"
          if [[ -n "${{ github.event.inputs.zola_version }}" ]]; then
            echo "ZOLA_VERSION=${{ github.event.inputs.zola_version }}" >> "$GITHUB_ENV"
          fi

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "20"

      - name: Sync generated content
        run: |
          set -euo pipefail
          node scripts/validate-project-data.js
          node scripts/sync-project-pages.js
          node scripts/generate-latest-posts-widget.js

      - name: Verify generated content is committed
        run: |
          set -euo pipefail
          if ! git diff --quiet -- content/projects static/widgets/latest-posts-data.json; then
            echo "ERROR: Generated content is out of sync."
            echo "Run 'just project-pages widget-data' locally and commit the results."
            git --no-pager diff -- content/projects static/widgets/latest-posts-data.json
            exit 1
          fi

      - name: Setup GitHub Pages
        id: pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0

      - name: Cache Zola binary
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.cargo/bin/zola
          key: zola-${{ env.ZOLA_VERSION || '0.19.2' }}

      - name: Install Zola
        uses: taiki-e/install-action@d858f8113943481093e02986a7586a4819a3bfd6 # v2
        with:
          tool: zola@${{ env.ZOLA_VERSION || '0.19.2' }}

      - name: Verify Zola installation
        run: zola --version

      - name: Cache CSS build dependencies
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            tools/tailwindcss
            src/vendor/daisyui.js
            src/vendor/daisyui-theme.js
          key: css-build-${{ env.TAILWIND_VERSION }}-${{ env.DAISYUI_VERSION }}

      - name: Build CSS (Tailwind + DaisyUI)
        run: |
          set -euo pipefail
          mkdir -p tools src/vendor
          
          if [[ ! -f tools/tailwindcss ]]; then
            echo "Downloading Tailwind CSS v${TAILWIND_VERSION}"
            curl -fsSL -o tools/tailwindcss "https://github.com/tailwindlabs/tailwindcss/releases/download/v${TAILWIND_VERSION}/tailwindcss-linux-x64"
            chmod +x tools/tailwindcss
          else
            echo "Using cached Tailwind CSS"
          fi
          
          if [[ ! -f src/vendor/daisyui.js ]]; then
            echo "Downloading DaisyUI v${DAISYUI_VERSION}"
            curl -fsSL -o src/vendor/daisyui.js "https://github.com/saadeghi/daisyui/releases/download/v${DAISYUI_VERSION}/daisyui.js"
            curl -fsSL -o src/vendor/daisyui-theme.js "https://github.com/saadeghi/daisyui/releases/download/v${DAISYUI_VERSION}/daisyui-theme.js"
          else
            echo "Using cached DaisyUI"
          fi
          
          echo "Building CSS"
          tools/tailwindcss -i src/main.css -o static/css/main.css --minify

      - name: Build site with Zola
        env:
          ZOLA_BASE_URL: ${{ steps.pages.outputs.base_url }}
        run: |
          echo "Building site with base URL: $ZOLA_BASE_URL"
          zola build --base-url "$ZOLA_BASE_URL"

      - name: Remove page/1 redirect stubs
        run: |
          set -euo pipefail
          node scripts/clean-pagination-redirects.js

      - name: Minify JS output (terser)
        run: |
          set -euo pipefail
          chmod +x scripts/minify-js.sh
          ./scripts/minify-js.sh public

      - name: Check site health
        run: |
          if [[ ! -f public/index.html ]]; then
            echo "ERROR: index.html not generated"
            exit 1
          fi
          if [[ ! -f public/404.html ]]; then
            echo "ERROR: 404.html not generated"
            exit 1
          fi
          echo "Site built successfully"
          find public -type f | wc -l | xargs echo "Total files:"

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@7b1f4a764d45c48632c6b24a0339c27f5614fb0b # v4.0.0
        with:
          path: ./public
          retention-days: 7

  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && github.event.inputs.deploy == 'true')
    timeout-minutes: 5

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0