---
name: Deploy Zola Site to GitHub Pages

# Intentionally no pull_request trigger: deployment checks do not gate PRs.
# CI/Lint workflows handle PR validation, including Dependabot PRs.

on:
  push:
    branches: [main]
    paths-ignore:
      - "README.md"
      - "LICENSE"
      - "docs/**"
      - ".prettierignore"
  workflow_dispatch:
    inputs:
      deploy:
        description: 'Deploy after build'
        required: false
        default: true
        type: boolean

permissions:
  attestations: write
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

defaults:
  run:
    shell: bash

jobs:
  build:
    name: Build Zola Site
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Setup build environment
        uses: ./.github/actions/setup-build-env
        with:
          install-imagemagick: "true"

      - name: Setup GitHub Pages
        id: pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0

      - name: Build site via justfile
        env:
          ZOLA_BASE_URL: ${{ steps.pages.outputs.base_url }}
        run: just ci-build

      - name: Build summary
        run: |
          set -euo pipefail
          file_count=$(find public -type f | wc -l | tr -d ' ')
          hashed_count=$(find public -type f -print | grep -Ec '\\.[a-f0-9]{12}\\.' || true)
          {
            echo "### Deploy Build Summary"
            echo "- Files in public/: ${file_count}"
            echo "- Fingerprinted assets: ${hashed_count}"
            echo "- Pages base URL: ${{ steps.pages.outputs.base_url }}"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Create deploy archive for provenance
        run: tar -czf site-deploy-${{ github.run_id }}.tar.gz public

      - name: Generate deploy attestation
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: site-deploy-${{ github.run_id }}.tar.gz

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: ./public
          retention-days: 7

  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: build
    if: >
      github.event_name == 'push' &&
      github.actor != 'dependabot[bot]' &&
      !startsWith(github.event.head_commit.message, 'chore: bump tool versions') &&
      !startsWith(github.event.head_commit.message, 'chore(deps):') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.deploy == 'true')
    timeout-minutes: 5

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0