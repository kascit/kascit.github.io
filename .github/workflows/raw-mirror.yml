---
name: Publish Raw Mirror Artifacts

on:
  push:
    branches: [main]
    paths:
      - "content/**"
      - "templates/**"
      - "static/**"
      - "data/**"
      - "config.toml"
      - ".github/raw-mirror-paths.txt"
      - ".github/workflows/raw-mirror.yml"
  workflow_dispatch:

permissions:
  contents: write

defaults:
  run:
    shell: bash

jobs:
  mirror:
    name: Refresh raw artifact mirror
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Load tool versions
        id: versions
        run: |
          grep -vE '^(#|$)' versions.env >> "$GITHUB_ENV"
          grep -vE '^(#|$)' versions.env | while IFS='=' read -r key value; do
            echo "${key}=${value}" >> "$GITHUB_OUTPUT"
          done

      - name: Setup build environment
        uses: ./.github/actions/setup-build-env
        with:
          install-imagemagick: "true"

      - name: Build site output
        run: |
          set -euo pipefail
          just ci-build
          test -f public/index.html

      - name: Stage configured mirrored files
        run: |
          set -euo pipefail
          MANIFEST_FILE=".github/raw-mirror-paths.txt"

          rm -rf .raw-mirror-staging
          mkdir -p .raw-mirror-staging

          if [ ! -f "$MANIFEST_FILE" ]; then
            echo "Error: Missing manifest at $MANIFEST_FILE"
            exit 1
          fi

          while IFS= read -r line || [ -n "$line" ]; do
            # Strip comments and carriage returns
            path="${line%%#*}"
            path="${path//$'\\r'/}"
            # Trim leading/trailing whitespace
            path="${path#"${path%%[![:space:]]*}"}"
            path="${path%"${path##*[![:space:]]}"}"

            if [ -z "$path" ]; then
              continue
            fi

            if [[ "$path" == *".."* ]]; then
              echo "Error: Directory traversal detected in path: $path"
              exit 1
            fi

            path="${path#/}"
            base="$(basename "$path")"
            source_file=""

            # 1. Check exact expected paths
            for candidate in "public/$path" "static/$path"; do
              if [ -f "$candidate" ]; then
                source_file="$candidate"
                break
              fi
            done

            # 2. Fallback: Search anywhere in public/ or static/ by filename
            if [ -z "$source_file" ]; then
              source_file=$(find public static -name "$base" -type f -print -quit 2>/dev/null || true)
            fi

            if [ -z "$source_file" ] || [ ! -f "$source_file" ]; then
              echo "Error: Missing artifact for '$path'. '$base' not found in public/ or static/."
              exit 1
            fi

            dest=".raw-mirror-staging/$path"
            mkdir -p "$(dirname "$dest")"
            cp "$source_file" "$dest"
          done < "$MANIFEST_FILE"

          find .raw-mirror-staging -type f | sort

      - name: Publish mirror branch
        run: |
          set -euo pipefail
          BRANCH="raw-mirror"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git fetch origin "$BRANCH" || true

          rm -rf .raw-mirror-branch
          if git ls-remote --exit-code --heads origin "$BRANCH" >/dev/null 2>&1; then
            git worktree add -B "$BRANCH" .raw-mirror-branch "origin/$BRANCH"
          else
            git worktree add -d .raw-mirror-branch
            cd .raw-mirror-branch
            git switch --orphan "$BRANCH"
            cd ..
          fi

          find .raw-mirror-branch -mindepth 1 -maxdepth 1 ! -name .git -exec rm -rf {} +
          cp -R .raw-mirror-staging/. .raw-mirror-branch/

          cat > .raw-mirror-branch/README.md <<'EOF'
          # Raw Mirror Branch

          This branch stores selected build artifacts for direct raw.githubusercontent.com access.
          Update `.github/raw-mirror-paths.txt` in `main` to add or remove mirrored files.
          EOF

          cd .raw-mirror-branch
          git add .

          if git diff --cached --quiet; then
            echo "Raw mirror unchanged."
            exit 0
          fi

          git commit -m "chore(raw-mirror): refresh mirrored artifacts [skip ci]"
          git push origin "HEAD:$BRANCH"
