        <span class="text-[10px] leading-tight">Auth</span>

    <a href="https://tasks.dhanur.me" class="flex flex-col items-center gap-1 {% if is_desktop %}p-2{% else %}p-2.5{% endif %} rounded-lg hover:bg-base-200 transition-colors no-underline hover:no-underline text-base-content">

    </a>

        <span class="text-[10px] leading-tight">About</span>
    </a>
    <a href="https://dhanur.me" class="flex flex-col items-center gap-1 {% if is_desktop %}p-2{% else %}p-2.5{% endif %} rounded-lg hover:bg-base-200 transition-colors no-underline hover:no-underline text-base-content">
