{% macro apps_grid(context="desktop") %}
{% set is_desktop = context == "desktop" %}
<div class="grid grid-cols-3 gap-1"{% if is_desktop %} data-apps-grid{% else %} data-apps-grid-sidebar{% endif %}>
    <a href="https://dhanur.me" class="flex flex-col items-center gap-1 {% if is_desktop %}p-2{% else %}p-2.5{% endif %} rounded-lg hover:bg-base-200 transition-colors no-underline hover:no-underline text-base-content">
        <i class="fa-solid fa-home text-base"></i>
        <span class="text-[10px] leading-tight">Home</span>
    </a>
    <a href="https://linkr.dhanur.me" class="flex flex-col items-center gap-1 {% if is_desktop %}p-2{% else %}p-2.5{% endif %} rounded-lg hover:bg-base-200 transition-colors no-underline hover:no-underline text-base-content">
        <i class="fa-solid fa-link text-base"></i>
        <span class="text-[10px] leading-tight">Linkr</span>
    </a>
    <a href="https://tasks.dhanur.me" class="flex flex-col items-center gap-1 {% if is_desktop %}p-2{% else %}p-2.5{% endif %} rounded-lg hover:bg-base-200 transition-colors no-underline hover:no-underline text-base-content">
        <i class="fa-solid fa-list-check text-base"></i>
        <span class="text-[10px] leading-tight">Tasks</span>
    </a>
</div>
{% endmacro %}
