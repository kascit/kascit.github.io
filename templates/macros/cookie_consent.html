{% macro banner() %}
<div
  id="cookie-consent-banner"
  class="cookie-consent-banner hidden"
  data-cookie-consent-banner
  role="dialog"
  aria-live="polite"
  aria-label="Cookie preferences"
>
  <div class="cookie-consent-banner__content">
    <p class="cookie-consent-banner__text">
      We use necessary cookies for core site features. Optional cookies enable analytics, error monitoring, and comments.
    </p>
    <div class="cookie-consent-banner__actions">
      <button type="button" class="cookie-consent-btn" data-cookie-consent-action="necessary">Necessary Only</button>
      <button type="button" class="cookie-consent-btn cookie-consent-btn--primary" data-cookie-consent-action="all">Allow All Cookies</button>
      <a href="/privacy/" class="cookie-consent-btn cookie-consent-btn--quiet">Privacy details</a>
    </div>
  </div>
</div>
{% endmacro banner %}
