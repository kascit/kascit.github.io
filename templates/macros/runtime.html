{% import "macros/head.html" as macros_head %}

{% macro site_config(config, lang) %}
    <script id="site-config" type="application/json">
    {
        "defaultColorset": "{{ macros_head::get_theme_colorset(config=config) | trim }}",
        "katexCss": "{{ get_url(path='css/katex.min.css') | safe }}",
        "katexJs": "{{ get_url(path='js/vendor/katex.min.js') | safe }}",
        "mermaidJs": "{{ get_url(path='js/vendor/mermaid.min.js') | safe }}",
        "fuseJs": "{{ get_url(path='js/vendor/fuse.min.js') | safe }}",
        "searchIndexJs": "{{ get_url(path='search_index.' ~ lang ~ '.js') | safe }}",
        "swPath": "{{ get_url(path='sw.js') | safe }}",
        "gtagId": "{{ config.extra.gtag | default(value='') }}",
        "ai": {
            "enabled": {{ config.extra.ai.enabled | default(value=true) }},
            "label": "{{ config.extra.ai.label | default(value='Ask AI about this') }}",
            "endpoint": "{{ config.extra.ai.endpoint | default(value='') }}",
            "profileUrl": "{{ config.extra.ai.profile_url | default(value='/data/ask-ai-profile.json') }}",
            "openInNewTab": {{ config.extra.ai.open_in_new_tab | default(value=false) }},
            "includePageContext": {{ config.extra.ai.include_page_context | default(value=true) }},
            "includeProfileContext": {{ config.extra.ai.include_profile_context | default(value=true) }},
            "maxContextChunks": {{ config.extra.ai.max_context_chunks | default(value=4) }},
            "maxHeadings": {{ config.extra.ai.max_headings | default(value=8) }},
            "requireAuth": {{ config.extra.ai.require_auth | default(value=true) }},
            "creditCost": {{ config.extra.ai.credit_cost | default(value=20) }},
            "guestMessage": "{{ config.extra.ai.guest_message | default(value='Sign in to use Ask AI') }}",
            "trustedEndpointHosts": {{ config.extra.ai.trusted_endpoint_hosts | default(value=[]) | json_encode() | safe }}
        },
        "sentryScriptUrl": "https://js-de.sentry-cdn.com/76f095eb3818528a530b2347e1735e14.min.js"
    }
    </script>
{% endmacro site_config %}

{% macro app_main_script() %}
        <script>
            (function(){
                var src = "{{ get_url(path='js/core/main.js') | safe }}";
                function load(){
                    var s = document.createElement("script");
                    s.type = "module";
                    s.src = src;
                    document.head.appendChild(s);
                }
                if ("requestIdleCallback" in window) {
                    requestIdleCallback(load, { timeout: 2500 });
                } else {
                    setTimeout(load, 1200);
                }
            })();
        </script>
{% endmacro app_main_script %}
