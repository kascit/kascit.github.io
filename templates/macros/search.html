{% macro search(config) %} {% if config.build_search_index %}
<!-- Search Modal -->
<input
  type="checkbox"
  id="search-modal"
  data-search-modal="true"
  class="modal-toggle"
  aria-hidden="true"
  tabindex="-1"
/>
<div
  data-search-mount="true"
  data-search-backdrop="true"
  class="modal modal-middle search-modal-root"
  role="dialog"
  aria-modal="true"
  aria-labelledby="search-title"
>
  <div class="search-modal-shell modal-box relative max-w-2xl p-0 bg-base-100 shadow-2xl">
    <div class="search-container">
      <!-- Search Input Container -->
      <div
        class="search-input-container px-6 pt-3 pb-4 border-b border-base-300/30"
      >
        <h2 id="search-title" class="sr-only">Search</h2>
        <div class="search-input-wrap relative">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            class="search-icon absolute left-4 top-1/2 -translate-y-1/2 h-5 w-5 text-base-content/40"
            fill="none"
            viewBox="0 0 24 24"
            stroke="currentColor"
            aria-hidden="true"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"
            />
          </svg>
          <input
            id="search"
            name="search"
            data-search-input="true"
            type="search"
            placeholder="Search posts..."
            class="search-input w-full pl-12 pr-32 py-3 text-base bg-transparent border-0 focus:outline-none focus:ring-0 text-base-content placeholder:text-base-content/40"
            aria-label="Search posts"
          />
          <button
            type="button"
            data-search-clear="true"
            class="search-clear-btn"
            aria-label="Clear search query"
            hidden
          >
            Clear
          </button>
          <button
            type="button"
            class="search-modal-close search-modal-close-inline"
            data-search-close="true"
            aria-label="Close search"
            title="Close search"
          >
            <svg
              xmlns="http://www.w3.org/2000/svg"
              class="h-4 w-4"
              fill="none"
              viewBox="0 0 24 24"
              stroke="currentColor"
              aria-hidden="true"
            >
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
            </svg>
          </button>
        </div>
      </div>
      <!-- Search Results Container -->
      <div data-search-results-container="true" class="search-results-container px-2 py-2 h-96 overflow-y-auto">
        <div
          data-search-results-header="true"
          class="search-results__header px-4 py-2 text-xs text-base-content/75"
        ></div>
        <ul data-search-results-items="true" class="search-results__items space-y-1"></ul>
      </div>
      <!-- Search Footer -->
      <div
        class="search-footer px-6 py-3 border-t border-base-300/30 flex items-center justify-end gap-4 text-xs text-base-content/50"
        data-desktop-only="true"
      >
        <div class="flex items-center gap-1">
          <kbd class="kbd kbd-xs">↑</kbd>
          <kbd class="kbd kbd-xs">↓</kbd>
          <span>to navigate</span>
        </div>
        <div class="flex items-center gap-1">
          <kbd class="kbd kbd-xs">↵</kbd>
          <span>to select</span>
        </div>
        <div class="flex items-center gap-1">
          <kbd class="kbd kbd-xs">ESC</kbd>
          <span>to close</span>
        </div>
        <div class="flex items-center gap-1">
          <kbd class="kbd kbd-xs">D</kbd>
          <kbd class="kbd kbd-xs">F</kbd>
          <span>to search this page</span>
        </div>
      </div>
    </div>
  </div>
</div>

<div
  data-page-find-panel="true"
  class="page-find-panel"
  role="dialog"
  aria-modal="false"
  aria-label="Search in current page"
  hidden
>
  <div class="page-find-shell">
    <svg
      xmlns="http://www.w3.org/2000/svg"
      class="page-find-icon h-4 w-4"
      fill="none"
      viewBox="0 0 24 24"
      stroke="currentColor"
      aria-hidden="true"
    >
      <path
        stroke-linecap="round"
        stroke-linejoin="round"
        stroke-width="2"
        d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"
      />
    </svg>
    <input
      id="page-find-input"
      name="page-find-input"
      type="text"
      data-page-find-input="true"
      class="page-find-input"
      placeholder="Find in this page..."
      aria-label="Find in this page"
      autocomplete="off"
      spellcheck="false"
    />
    <span data-page-find-count="true" class="page-find-count">0 / 0</span>
    <button type="button" class="page-find-btn" data-page-find-prev="true" aria-label="Previous match">↑</button>
    <button type="button" class="page-find-btn" data-page-find-next="true" aria-label="Next match">↓</button>
    <button type="button" class="page-find-clear" data-page-find-clear="true" aria-label="Clear current page search">Clear</button>
    <button type="button" class="page-find-btn page-find-close" data-page-find-close="true" aria-label="Close page search" title="Close (Esc)">✕</button>
  </div>
</div>
{% endif %} {% endmacro search %}
