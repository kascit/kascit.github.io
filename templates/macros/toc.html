{% macro toc(page) %} {% if page.toc %}
<!-- Table of Contents - Desktop only (lg breakpoint and up) -->
<aside
  id="toc-sidebar"
  data-toc-sidebar="true"
  class="hidden lg:block origin-right"
  data-toc-expand="false"
  role="navigation"
  aria-label="Table of contents"
>
  <div class="sticky top-20 px-4 py-2 border-l border-base-content/10">
    <h2 class="text-[11px] font-semibold uppercase tracking-wider text-base-content/68 mb-3">On this page</h2>
    <ul class="menu menu-sm toc-menu">
      {% for h1 in page.toc %}
      <li>
        {% if h1.children %}
        <details class="toc-details">
          <summary
            role="button"
            data-toc-href="{{ h1.permalink | safe }}"
            aria-label="{{ h1.title }}"
          >
            <a href="{{ h1.permalink | safe }}" class="toc-link"
              >{{ h1.title }}</a
            >
          </summary>
          <ul>
            {% for h2 in h1.children %}
            <li>
              <a href="{{ h2.permalink | safe }}" class="toc-link"
                >{{ h2.title }}</a
              >
            </li>
            {% endfor %}
          </ul>
        </details>
        {% else %}
        <a href="{{ h1.permalink | safe }}" class="toc-link">{{ h1.title }}</a>
        {% endif %}
      </li>
      {% endfor %}
    </ul>
  </div>
</aside>
{% endif %} {% endmacro toc %}
