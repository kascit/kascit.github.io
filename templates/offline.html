{% extends "status.html" %}

{% set status_title = "Offline" %}
{% set status_desc = "No internet connection" %}
{% set status_url = config.base_url ~ "/offline/" %}

{% block status_content %}
<p id="offline-status" data-offline-status="true" class="mt-4 text-sm text-base-content/50"></p>
{% endblock status_content %}

{% block status_scripts %}
<script src="{{ get_url(path='js/offline-reload.js') | safe }}"></script>
{% endblock status_scripts %}
