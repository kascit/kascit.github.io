<figure class="diff aspect-16/9" tabindex="0">
  <div class="diff-item-1" role="img" tabindex="0">
    <img alt="{{ alt | default(value="Image diff original") }}" src="{{ src1 }}" sizes="(min-width: 1024px) 768px, 100vw"
    loading="lazy" />
  </div>
  <div class="diff-item-2" role="img">
    <img alt="{{ alt | default(value="Image diff changed") }}" src="{{ src2 }}" sizes="(min-width: 1024px) 768px, 100vw"
    loading="lazy" />
  </div>
  <div class="diff-resizer"></div>
</figure>
