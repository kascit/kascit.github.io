{% set chip_name = name | default(value="") | trim %}
{% if chip_name %}
{% set chip_variant = variant | default(value="tag") %}
{% set chip_label = label | default(value=chip_name) | trim %}
{% set chip_slug = chip_name | slugify %}
<a href="/tags/{{ chip_slug }}/" class="surface-chip-link taxonomy-chip taxonomy-chip--{{ chip_variant }}" aria-label="View tag {{ chip_name }}">{{ chip_label }}</a>
{% endif %}
