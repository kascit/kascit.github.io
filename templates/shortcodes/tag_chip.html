{% set chip_name = name | default(value="") | trim %}
{% if chip_name %}
{% set chip_variant = variant | default(value="tag") %}
{% set chip_label = label | default(value=chip_name) | trim %}
<a href="/about/" class="surface-chip-link taxonomy-chip taxonomy-chip--{{ chip_variant }}" aria-label="View About page">{{ chip_label }}</a>
{% endif %}
